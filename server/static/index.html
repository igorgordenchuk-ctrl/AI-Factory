<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Factory — Kanban Dashboard</title>
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --border: #30363d;
            --text: #e6edf3;
            --text-dim: #8b949e;
            --accent: #58a6ff;
            --green: #3fb950;
            --yellow: #d29922;
            --red: #f85149;
            --purple: #bc8cff;
            --orange: #f0883e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* Header */
        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h1 {
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header h1 .icon { font-size: 22px; }

        .header-stats {
            display: flex;
            gap: 20px;
            font-size: 13px;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-dim);
        }

        .stat .value {
            color: var(--text);
            font-weight: 600;
        }

        .stat .value.cost { color: var(--green); }
        .stat .value.tokens { color: var(--accent); }
        .stat .value.agents { color: var(--purple); }

        /* Submit bar */
        .submit-bar {
            padding: 12px 24px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 12px;
        }

        .submit-bar input {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 8px 14px;
            color: var(--text);
            font-size: 14px;
            outline: none;
        }

        .submit-bar input:focus { border-color: var(--accent); }
        .submit-bar input::placeholder { color: var(--text-dim); }

        .submit-bar button {
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 8px 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .submit-bar button:hover { opacity: 0.85; }
        .submit-bar button:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Kanban board */
        .board {
            display: flex;
            gap: 12px;
            padding: 16px 24px;
            overflow-x: auto;
            min-height: calc(100vh - 120px);
            align-items: flex-start;
        }

        .column {
            min-width: 280px;
            max-width: 320px;
            flex-shrink: 0;
            background: var(--surface);
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .column-header {
            padding: 12px 14px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 13px;
            font-weight: 600;
        }

        .column-header .name {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .column-header .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .column-header .count {
            background: var(--bg);
            border-radius: 10px;
            padding: 2px 8px;
            font-size: 12px;
            color: var(--text-dim);
        }

        .column.inbox .dot { background: var(--text-dim); }
        .column.planning .dot { background: var(--accent); }
        .column.ready .dot { background: #58a6ff; }
        .column.progress .dot { background: var(--yellow); }
        .column.review .dot { background: var(--purple); }
        .column.rework .dot { background: var(--red); }
        .column.completed .dot { background: var(--green); }

        .column-body {
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: calc(100vh - 220px);
            overflow-y: auto;
        }

        .column-body:empty::after {
            content: 'No tasks';
            display: block;
            text-align: center;
            padding: 20px 0;
            color: var(--text-dim);
            font-size: 12px;
        }

        /* Task cards */
        .card {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 12px;
            cursor: pointer;
            transition: border-color 0.2s, transform 0.1s;
        }

        .card:hover {
            border-color: var(--accent);
            transform: translateY(-1px);
        }

        .card-title {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            line-height: 1.3;
        }

        .card-id {
            font-size: 11px;
            color: var(--text-dim);
            font-family: monospace;
        }

        .card-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 8px;
        }

        .tag {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 10px;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-dim);
        }

        .tag.skill { border-color: var(--accent); color: var(--accent); }
        .tag.priority-high { border-color: var(--red); color: var(--red); }
        .tag.priority-mid { border-color: var(--yellow); color: var(--yellow); }
        .tag.priority-low { border-color: var(--green); color: var(--green); }
        .tag.cost { color: var(--green); border-color: var(--green); }
        .tag.score { color: var(--purple); border-color: var(--purple); }
        .tag.rework-tag { border-color: var(--red); color: var(--red); }
        .tag.agent { border-color: var(--orange); color: var(--orange); }

        .card-review {
            margin-top: 8px;
            padding: 6px 8px;
            border-radius: 4px;
            font-size: 11px;
            background: rgba(248, 81, 73, 0.1);
            border-left: 3px solid var(--red);
            color: var(--text-dim);
        }

        .card-review.approved {
            background: rgba(63, 185, 80, 0.1);
            border-left-color: var(--green);
        }

        /* Task detail modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            padding: 24px;
        }

        .modal h2 { font-size: 16px; margin-bottom: 16px; }

        .modal-close {
            float: right;
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 20px;
            cursor: pointer;
        }

        .modal-field {
            margin-bottom: 12px;
        }

        .modal-field label {
            font-size: 12px;
            color: var(--text-dim);
            display: block;
            margin-bottom: 4px;
        }

        .modal-field .value {
            font-size: 14px;
            white-space: pre-wrap;
        }

        /* Auto-refresh indicator */
        .refresh-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--green);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    </style>
</head>
<body>
    <div class="header">
        <h1><span class="icon">&#9881;</span> AI Factory</h1>
        <div class="header-stats">
            <div class="stat">
                <div class="refresh-dot"></div>
                <span>auto-refresh</span>
            </div>
            <div class="stat">
                Tasks: <span class="value" id="total-tasks">0</span>
            </div>
            <div class="stat">
                Agents: <span class="value agents" id="total-agents">0</span>
            </div>
            <div class="stat">
                Cost: <span class="value cost" id="total-cost">$0.00</span>
            </div>
            <div class="stat">
                Tokens: <span class="value tokens" id="total-tokens">0</span>
            </div>
        </div>
    </div>

    <div class="submit-bar">
        <input type="text" id="task-input" placeholder="Describe a task... (e.g. Create a REST API with Flask)" />
        <button id="submit-btn" onclick="submitTask()">Submit Task</button>
    </div>

    <div class="board" id="board"></div>

    <div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
        <div class="modal" id="modal"></div>
    </div>

    <script>
        const STAGES = [
            { key: '0_inbox',       name: 'Inbox',       cls: 'inbox' },
            { key: '1_planning',    name: 'Planning',    cls: 'planning' },
            { key: '2_ready',       name: 'Ready',       cls: 'ready' },
            { key: '3_in_progress', name: 'In Progress', cls: 'progress' },
            { key: '4_review',      name: 'Review',      cls: 'review' },
            { key: '5_rework',      name: 'Rework',      cls: 'rework' },
            { key: '6_completed',   name: 'Completed',   cls: 'completed' },
        ];

        function priorityClass(p) {
            if (p <= 3) return 'priority-high';
            if (p <= 6) return 'priority-mid';
            return 'priority-low';
        }

        function renderCard(task) {
            const skills = (task.required_skills || []).map(s =>
                `<span class="tag skill">${s}</span>`
            ).join('');

            const priTag = `<span class="tag ${priorityClass(task.priority)}">P${task.priority}</span>`;

            let costTag = '';
            if (task.cost > 0) {
                costTag = `<span class="tag cost">$${task.cost.toFixed(4)}</span>`;
            }

            let scoreTag = '';
            if (task.review_score > 0) {
                scoreTag = `<span class="tag score">${task.review_score}/10</span>`;
            }

            let agentTag = '';
            if (task.assigned_agent_id) {
                agentTag = `<span class="tag agent">${task.assigned_agent_id}</span>`;
            }

            let reviewHtml = '';
            if (task.review_notes && task.review_notes.length > 0) {
                const last = task.review_notes[task.review_notes.length - 1];
                const cls = last.verdict === 'APPROVED' ? 'approved' : '';
                const notes = (last.notes || []).slice(0, 2).join('; ');
                reviewHtml = `<div class="card-review ${cls}">${last.verdict}: ${notes}</div>`;
            }

            let attemptTag = '';
            if (task.attempt > 0) {
                attemptTag = `<span class="tag rework-tag">attempt ${task.attempt}/${task.max_attempts}</span>`;
            }

            return `
                <div class="card" onclick="showDetail('${task.id}')">
                    <div class="card-title">${escHtml(task.title)}</div>
                    <div class="card-id">${task.id}</div>
                    <div class="card-meta">
                        ${priTag}${skills}${costTag}${scoreTag}${agentTag}${attemptTag}
                    </div>
                    ${reviewHtml}
                </div>
            `;
        }

        function renderBoard(pipeline) {
            let totalTasks = 0;
            const board = document.getElementById('board');
            board.innerHTML = '';

            STAGES.forEach(stage => {
                const tasks = pipeline[stage.key] || [];
                totalTasks += tasks.length;

                const col = document.createElement('div');
                col.className = `column ${stage.cls}`;
                col.innerHTML = `
                    <div class="column-header">
                        <div class="name"><div class="dot"></div> ${stage.name}</div>
                        <span class="count">${tasks.length}</span>
                    </div>
                    <div class="column-body">
                        ${tasks.map(renderCard).join('')}
                    </div>
                `;
                board.appendChild(col);
            });

            document.getElementById('total-tasks').textContent = totalTasks;
        }

        function updateStats(summary) {
            const costs = summary.costs || {};
            const agents = summary.agents || {};

            document.getElementById('total-cost').textContent =
                `$${(costs.cost_usd || 0).toFixed(4)}`;

            const tokens = (costs.input_tokens || 0) + (costs.output_tokens || 0);
            document.getElementById('total-tokens').textContent =
                tokens > 1000 ? `${(tokens / 1000).toFixed(1)}k` : tokens;

            document.getElementById('total-agents').textContent =
                `${agents.active || 0}/${agents.total || 0}`;
        }

        async function refresh() {
            try {
                const [pipeRes, sumRes] = await Promise.all([
                    fetch('/api/pipeline'),
                    fetch('/api/summary'),
                ]);
                const pipeline = await pipeRes.json();
                const summary = await sumRes.json();
                renderBoard(pipeline);
                updateStats(summary);
            } catch (e) {
                console.error('Refresh error:', e);
            }
        }

        async function submitTask() {
            const input = document.getElementById('task-input');
            const btn = document.getElementById('submit-btn');
            const desc = input.value.trim();
            if (!desc) return;

            btn.disabled = true;
            btn.textContent = 'Submitting...';

            try {
                const res = await fetch('/api/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ description: desc }),
                });
                const data = await res.json();
                input.value = '';
                setTimeout(refresh, 500);
            } catch (e) {
                alert('Error: ' + e.message);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Submit Task';
            }
        }

        async function showDetail(taskId) {
            try {
                const res = await fetch(`/api/tasks/${taskId}`);
                const task = await res.json();

                const modal = document.getElementById('modal');
                modal.innerHTML = `
                    <button class="modal-close" onclick="closeModal()">&times;</button>
                    <h2>${escHtml(task.title)}</h2>
                    <div class="modal-field">
                        <label>ID / Project</label>
                        <div class="value">${task.id} / ${task.project_id || '-'}</div>
                    </div>
                    <div class="modal-field">
                        <label>Status</label>
                        <div class="value">${task.status} (${task.stage_folder})</div>
                    </div>
                    <div class="modal-field">
                        <label>Description</label>
                        <div class="value">${escHtml(task.description)}</div>
                    </div>
                    ${task.acceptance_criteria && task.acceptance_criteria.length ? `
                    <div class="modal-field">
                        <label>Acceptance Criteria</label>
                        <div class="value">${task.acceptance_criteria.map((c,i) => `${i+1}. ${escHtml(c)}`).join('\n')}</div>
                    </div>` : ''}
                    <div class="modal-field">
                        <label>Skills / Agent</label>
                        <div class="value">${(task.required_skills || []).join(', ') || '-'} / ${task.assigned_agent_id || '-'}</div>
                    </div>
                    <div class="modal-field">
                        <label>Dependencies</label>
                        <div class="value">${(task.depends_on || []).join(', ') || 'none'}</div>
                    </div>
                    <div class="modal-field">
                        <label>Subtasks</label>
                        <div class="value">${(task.subtask_ids || []).join(', ') || 'none'}</div>
                    </div>
                    <div class="modal-field">
                        <label>Cost / Tokens</label>
                        <div class="value">$${(task.cost || 0).toFixed(4)} | ${JSON.stringify(task.tokens_used || {})}</div>
                    </div>
                    <div class="modal-field">
                        <label>Attempt / Score</label>
                        <div class="value">${task.attempt}/${task.max_attempts} | Score: ${task.review_score || '-'}</div>
                    </div>
                    ${task.review_notes && task.review_notes.length ? `
                    <div class="modal-field">
                        <label>Reviews</label>
                        <div class="value">${task.review_notes.map(r =>
                            `[${r.verdict}] Score: ${r.score} — ${(r.notes || []).join('; ')}`
                        ).join('\n')}</div>
                    </div>` : ''}
                    ${task.output_files && task.output_files.length ? `
                    <div class="modal-field">
                        <label>Output Files</label>
                        <div class="value">${task.output_files.join('\n')}</div>
                    </div>` : ''}
                `;

                document.getElementById('modal-overlay').classList.add('active');
            } catch (e) {
                console.error('Detail error:', e);
            }
        }

        function closeModal(event) {
            if (!event || event.target.id === 'modal-overlay' || event.target.classList.contains('modal-close')) {
                document.getElementById('modal-overlay').classList.remove('active');
            }
        }

        function escHtml(s) {
            if (!s) return '';
            return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }

        // Enter key to submit
        document.getElementById('task-input').addEventListener('keydown', e => {
            if (e.key === 'Enter') submitTask();
        });

        // Auto-refresh every 3 seconds
        refresh();
        setInterval(refresh, 3000);
    </script>
</body>
</html>
